<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lake Michigan Weekend Events Map - May 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #0f172a;
            --bg-card-hover: #172033;
            --bg-header: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --bg-legend: rgba(15, 23, 42, 0.92);
            --bg-popup: #1e293b;
            --bg-filter: transparent;
            --bg-filter-hover: rgba(59, 130, 246, 0.12);
            --bg-filter-active: #3b82f6;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-heading: #f1f5f9;
            --text-time: #60a5fa;
            --text-gradient-1: #60a5fa;
            --text-gradient-2: #a78bfa;
            --border-color: #334155;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --marker-shadow: rgba(0, 0, 0, 0.4);
            --marker-border: #fff;
            --tag-outdoor-bg: #065f46; --tag-outdoor-fg: #6ee7b7;
            --tag-festival-bg: #7c2d12; --tag-festival-fg: #fdba74;
            --tag-library-bg: #1e3a5f; --tag-library-fg: #93c5fd;
            --tag-nature-bg: #064e3b; --tag-nature-fg: #86efac;
            --tag-educational-bg: #4c1d95; --tag-educational-fg: #c4b5fd;
            --tag-free-bg: #713f12; --tag-free-fg: #fde68a;
            --tag-starwars-bg: #7c2d12; --tag-starwars-fg: #fdba74;
            --tag-sport-bg: #1e3a5f; --tag-sport-fg: #67e8f9;
            --toggle-bg: #475569;
            --toggle-knob: #f1f5f9;
            --toggle-icon: "🌙";
            --scrollbar-track: #1e293b;
            --scrollbar-thumb: #475569;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-pill: 999px;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --bg-header: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            --bg-legend: rgba(255, 255, 255, 0.96);
            --bg-popup: #ffffff;
            --bg-filter: transparent;
            --bg-filter-hover: rgba(59, 130, 246, 0.08);
            --bg-filter-active: #3b82f6;
            --text-primary: #334155;
            --text-secondary: #64748b;
            --text-heading: #0f172a;
            --text-time: #2563eb;
            --text-gradient-1: #2563eb;
            --text-gradient-2: #7c3aed;
            --border-color: #e2e8f0;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --marker-shadow: rgba(0, 0, 0, 0.12);
            --marker-border: #e2e8f0;
            --tag-outdoor-bg: #d1fae5; --tag-outdoor-fg: #065f46;
            --tag-festival-bg: #ffedd5; --tag-festival-fg: #9a3412;
            --tag-library-bg: #dbeafe; --tag-library-fg: #1e40af;
            --tag-nature-bg: #dcfce7; --tag-nature-fg: #166534;
            --tag-educational-bg: #ede9fe; --tag-educational-fg: #5b21b6;
            --tag-free-bg: #fef3c7; --tag-free-fg: #92400e;
            --tag-starwars-bg: #ffedd5; --tag-starwars-fg: #9a3412;
            --tag-sport-bg: #dbeafe; --tag-sport-fg: #0e7490;
            --toggle-bg: #cbd5e1;
            --toggle-knob: #ffffff;
            --scrollbar-track: #f1f5f9;
            --scrollbar-thumb: #cbd5e1;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.35s ease, color 0.35s ease;
            overflow: hidden;
            height: 100vh;
        }

        /* ====== HEADER ====== */
        #header {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            transition: background 0.35s ease, border-color 0.35s ease;
            z-index: 2000;
            position: relative;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0 10px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--text-gradient-1), var(--text-gradient-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .brand-text h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-heading);
            line-height: 1.2;
        }

        .brand-text .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .count-badge {
            background: linear-gradient(135deg, var(--text-gradient-1), var(--text-gradient-2));
            color: #fff;
            padding: 5px 14px;
            border-radius: var(--radius-pill);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        /* ====== THEME TOGGLE ====== */
        #theme-toggle {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.15rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            position: relative;
        }

        #theme-toggle:hover {
            border-color: var(--accent);
            background: var(--bg-filter-hover);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        #theme-toggle:active {
            transform: scale(0.94);
        }

        #theme-toggle .icon-sun,
        #theme-toggle .icon-moon {
            position: absolute;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        [data-theme="dark"] #theme-toggle .icon-sun { opacity: 0; transform: rotate(90deg) scale(0); }
        [data-theme="dark"] #theme-toggle .icon-moon { opacity: 1; transform: rotate(0) scale(1); }
        [data-theme="light"] #theme-toggle .icon-sun { opacity: 1; transform: rotate(0) scale(1); }
        [data-theme="light"] #theme-toggle .icon-moon { opacity: 0; transform: rotate(-90deg) scale(0); }

        /* ====== FILTER BAR ====== */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 0 12px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-color);
            background: var(--bg-filter);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            user-select: none;
            -webkit-user-select: none;
        }

        .filter-btn .emoji {
            font-size: 0.9rem;
            line-height: 1;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            background: var(--bg-filter-hover);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--bg-filter-active);
            border-color: var(--bg-filter-active);
            color: #ffffff;
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .filter-btn:active {
            transform: scale(0.96);
        }

        /* ====== MAP CONTAINER ====== */
        #map-container {
            display: flex;
            height: calc(100vh - 140px);
            margin-bottom: 12px;
        }

        #map {
            flex: 1;
            min-height: 400px;
        }

        #sidebar {
            width: 360px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 16px 16px 60px 16px;
            transition: background 0.35s ease, border-color 0.35s ease;
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }

        #sidebar::-webkit-scrollbar {
            width: 5px;
        }

        #sidebar::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        #sidebar::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
        }

        /* ====== EVENT CARDS ====== */
        .event-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .event-card:hover {
            border-color: var(--accent);
            background: var(--bg-card-hover);
            transform: translateX(3px);
            box-shadow: var(--shadow-sm);
        }

        .event-card .event-title {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-heading);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .event-card .event-location {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .event-card .event-time {
            font-size: 0.75rem;
            color: var(--text-time);
            margin-top: 3px;
        }

        .event-card .event-tag {
            display: inline-block;
            font-size: 0.62rem;
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            margin-top: 6px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .tag-outdoor { background: var(--tag-outdoor-bg); color: var(--tag-outdoor-fg); }
        .tag-festival { background: var(--tag-festival-bg); color: var(--tag-festival-fg); }
        .tag-library { background: var(--tag-library-bg); color: var(--tag-library-fg); }
        .tag-nature { background: var(--tag-nature-bg); color: var(--tag-nature-fg); }
        .tag-educational { background: var(--tag-educational-bg); color: var(--tag-educational-fg); }
        .tag-free { background: var(--tag-free-bg); color: var(--tag-free-fg); }
        .tag-starwars { background: var(--tag-starwars-bg); color: var(--tag-starwars-fg); }
        .tag-sport { background: var(--tag-sport-bg); color: var(--tag-sport-fg); }


        /* ====== SITE FILTER ====== */
        .site-btn {
            padding: 5px 12px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-color);
            background: var(--bg-filter);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            user-select: none;
            -webkit-user-select: none;
        }

        .site-btn .emoji {
            font-size: 0.85rem;
            line-height: 1;
        }

        .site-btn:hover {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.08);
            color: var(--text-primary);
        }

        .site-btn.active {
            background: #10b981;
            border-color: #10b981;
            color: #ffffff;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.3);
        }

        .site-btn:active {
            transform: scale(0.96);
        }

        /* ====== LEGEND ====== */

        .legend-control {
            padding-bottom: 4px;
        }

        .legend {
            background: var(--bg-legend);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            font-size: 0.72rem;
            color: var(--text-primary);
            transition: all 0.35s ease;
            box-shadow: var(--shadow-md);
            margin: 10px;
            z-index: 1000;
        }

        @media (min-width: 641px) {
            .legend {
                margin: 16px;
            }
        }

        .legend-title {
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text-heading);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            margin: 3px 0;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1.5px solid rgba(255,255,255,0.15);
        }

        /* ====== POPUP ====== */
        .leaflet-popup-content-wrapper {
            background: var(--bg-popup) !important;
            color: var(--text-primary) !important;
            border-radius: var(--radius) !important;
            border: 1px solid var(--border-color) !important;
            box-shadow: var(--shadow-md) !important;
            transition: all 0.35s ease;
        }

        .leaflet-popup-tip {
            background: var(--bg-popup) !important;
            border: 1px solid var(--border-color) !important;
        }

        .leaflet-popup-content {
            margin: 12px 16px !important;
            font-family: 'Inter', 'Segoe UI', sans-serif !important;
        }

        .popup-title {
            font-weight: 700;
            font-size: 0.88rem;
            margin-bottom: 6px;
            color: var(--text-heading);
            line-height: 1.3;
        }

        .popup-detail {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin: 3px 0;
        }

        .popup-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            color: var(--accent);
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            padding: 4px 0;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .popup-link:hover {
            border-bottom-color: var(--accent);
        }


        /* ====== SEARCH + CALENDAR ====== */
        .sidebar-header {
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 8px;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .calendar-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .calendar-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        /* Flatpickr theme overrides */
        .flatpickr-calendar {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-color) !important;
            box-shadow: var(--shadow-md) !important;
            border-radius: var(--radius) !important;
        }

        .flatpickr-day {
            color: var(--text-primary) !important;
        }

        .flatpickr-day:hover {
            background: var(--bg-filter-hover) !important;
        }

        .flatpickr-day.selected {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
        }

        .flatpickr-months .flatpickr-month {
            background: var(--bg-secondary) !important;
        }

        .flatpickr-current-month .flatpickr-monthDropdown-months,
        .flatpickr-current-month input.cur-year {
            color: var(--text-primary) !important;
        }

        .flatpickr-months .flatpickr-prev-month,
        .flatpickr-months .flatpickr-next-month {
            color: var(--text-primary) !important;
            fill: var(--text-primary) !important;
        }

        .flatpickr-day.today {
            border-color: var(--accent) !important;
        }

        .flatpickr-day.today:hover {
            background: var(--accent) !important;
        }

        span.flatpickr-weekday {
            color: var(--text-secondary) !important;
        }

        .flatpickr-day.inRange,
        .flatpickr-day.prevMonthDay.inRange,
        .flatpickr-day.nextMonthDay.inRange {
            background: var(--accent-glow) !important;
            border-color: transparent !important;
        }

        .flatpickr-day.startRange,
        .flatpickr-day.endRange {
            background: var(--accent) !important;
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 900px) {
            #header { padding: 0 16px; }
            .header-top { padding: 10px 0 8px; }
            .brand-text h1 { font-size: 1rem; }
            .brand-icon { width: 30px; height: 30px; font-size: 0.9rem; }
            #theme-toggle { width: 36px; height: 36px; font-size: 1rem; }
            .filter-btn { padding: 5px 10px; font-size: 0.72rem; }
            #sidebar { width: 300px; padding: 12px; }
        }

        @media (max-width: 640px) {
            #map-container { flex-direction: column; }
            #map { min-height: 45vh; flex: none; }
            #sidebar {
                width: 100%;
                flex: 1;
                border-left: none;
                border-top: 1px solid var(--border-color);
                padding: 12px;
            }
            .brand-icon { display: none; }
            .brand-text .subtitle { display: none; }
            .count-badge { font-size: 0.7rem; padding: 4px 10px; }
        }
    </style>
    <!-- Flatpickr calendar -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
</head>
<body>
    <div id="header">
        <div class="header-top">
            <div class="brand">
                <div class="brand-icon">🗺️</div>
                <div class="brand-text">
                    <h1>Mid Michigan & Lake Michigan Events</h1>
                    <div class="subtitle">Kid-Friendly Events Across 7 Regions — May 2026</div>
                </div>
            </div>
            <div class="header-actions">
                <span class="count-badge" id="count">150 events</span>
                <button id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
                    <span class="icon-moon">🌙</span>
                    <span class="icon-sun">☀️</span>
                </button>
            </div>
        </div>
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all"><span class="emoji">📋</span>All</button>
            <button class="filter-btn" data-filter="outdoor"><span class="emoji">🌳</span>Outdoor</button>
            <button class="filter-btn" data-filter="festival"><span class="emoji">🎪</span>Festival</button>
            <button class="filter-btn" data-filter="library"><span class="emoji">📚</span>Library</button>
            <button class="filter-btn" data-filter="nature"><span class="emoji">🦎</span>Nature</button>
            <button class="filter-btn" data-filter="educational"><span class="emoji">🎓</span>Educational</button>
            <button class="filter-btn" data-filter="free"><span class="emoji">🎉</span>Free</button>
            <button class="filter-btn" data-filter="starwars"><span class="emoji">⚔️</span>Star Wars</button>
            <button class="filter-btn" data-filter="sport"><span class="emoji">🏊</span>Sports</button>
        </div>
        <div class="filter-bar">
            <button class="site-btn active" data-site="all"><span class="emoji">🌍</span>All Regions</button>
            <button class="site-btn" data-site="Detroit Metro"><span class="emoji">🏙️</span>Detroit Metro</button>
            <button class="site-btn" data-site="South Haven"><span class="emoji">🌊</span>South Haven</button>
            <button class="site-btn" data-site="Traverse City"><span class="emoji">🍒</span>Traverse City</button>
            <button class="site-btn" data-site="Grand Haven"><span class="emoji">🏖️</span>Grand Haven</button>
            <button class="site-btn" data-site="Mt. Pleasant"><span class="emoji">🏫</span>Mt. Pleasant</button>
            <button class="site-btn" data-site="Battle Creek"><span class="emoji">🌽</span>Battle Creek</button>
            <button class="site-btn" data-site="Grand Rapids"><span class="emoji">🌷</span>Grand Rapids</button>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <div id="sidebar">
            <div class="sidebar-header">
                <input type="text" class="search-input" id="search-input" placeholder="Search events, locations, dates...">
                <input type="text" class="calendar-input" id="calendar-input" placeholder="Select date or date range">
            </div>
            <div id="event-list"></div>
        </div>

    const categoryColors = {
        outdoor: '#22c55e',
        festival: '#f97316',
        library: '#3b82f6',
        nature: '#10b981',
        educational: '#a855f7',
        free: '#eab308',
        starwars: '#f97316',
        sport: '#06b6d4'
    };

    const categoryEmojis = {
        outdoor: '🌳',
        festival: '🎪',
        library: '📚',
        nature: '🦎',
        educational: '🎓',
        free: '🎉',
        starwars: '⚔️',
        sport: '🏊'
    };

    // Reusable tile layer reference
    const baseTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
        maxZoom: 19
    });

    // Initialize map centered on Metro Detroit
    const map = L.map('map', {
        zoomControl: true
    }).setView([43.5, -84.5], 7);

    baseTile.addTo(map);

    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const darkTiles = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
    const lightTiles = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('map-theme', theme);
        baseTile.setUrl(theme === 'light' ? lightTiles : darkTiles);
    }

    const savedTheme = localStorage.getItem('map-theme');
    if (savedTheme) {
        setTheme(savedTheme);
    } else {
        setTheme('light');
    }

    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
        if (!localStorage.getItem('map-theme')) {
            setTheme(e.matches ? 'light' : 'dark');
        }
    });

    themeToggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Create custom icon
    function createIcon(category) {
        const color = categoryColors[category] || '#60a5fa';
        return L.divIcon({
            className: 'custom-marker',
            html: `<div style="
                width: 14px; height: 14px;
                background: ${color};
                border: 2px solid #fff;
                border-radius: 50%;
                box-shadow: 0 1px 6px rgba(0,0,0,0.35);
            "></div>`,
            iconSize: [14, 14],
            iconAnchor: [7, 7],
            popupAnchor: [0, -10]
        });
    }

    // Store markers
    const markers = [];
    const sidebar = document.getElementById('sidebar');
    const eventList = document.getElementById('event-list');

    // Add events to map
    events.forEach((event, idx) => {
        if (!event.lat || !event.lon) return;

        const marker = L.marker([event.lat, event.lon], {
            icon: createIcon(event.category)
        }).addTo(map);

        const popupContent = `
            <div class="popup-title">${event.title}</div>
            <div class="popup-detail">📍 ${event.location}</div>
            <div class="popup-detail">⏰ ${event.time}</div>
            <div class="popup-detail">📅 ${event.date}</div>
            <a class="popup-link" href="${event.url}" target="_blank">Learn More →</a>
        `;

        marker.bindPopup(popupContent, { maxWidth: 280 });
        markers.push({ marker, event, idx });

        // Add to sidebar
        const card = document.createElement('div');
        card.className = 'event-card';
        card.dataset.category = event.category;
        card.dataset.site = event.site || '';
        card.innerHTML = `
            <div class="event-title">${categoryEmojis[event.category] || '📌'} ${event.title}</div>
            <div class="event-location">📍 ${event.location}</div>
            <div class="event-time">⏰ ${event.time} &bull; 📅 ${event.date}</div>
            <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">
                <span class="event-tag tag-${event.category}">${event.category}</span>
                <span class="event-tag tag-site" style="background:rgba(16,185,129,0.15);color:#34d399;font-size:0.6rem">${event.site || ''}</span>
            </div>
        `;
        card.addEventListener('click', () => {
            map.flyTo([event.lat, event.lon], 14, { duration: 0.8 });
            marker.openPopup();
        });
        eventList.appendChild(card);
    });

    // Fit map to show all markers
    const group = L.featureGroup(markers.map(m => m.marker));
    map.fitBounds(group.getBounds().pad(0.08));

    // Category filter functionality
    let activeFilter = 'all';
    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const filter = btn.dataset.filter;
            activeFilter = filter;

            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            let count = 0;
            markers.forEach(({ marker, event }) => {
                const show = filter === 'all' || event.category === filter;
                if (show) {
                    marker.addTo(map);
                    count++;
                } else {
                    map.removeLayer(marker);
                }
            });

            document.querySelectorAll('.event-card').forEach(card => {
                const show = filter === 'all' || card.dataset.category === filter;
                const showSite = activeSite === 'all' || card.dataset.site === activeSite;
                card.style.display = (show && showSite) ? 'block' : 'none';
            });

            document.getElementById('count').textContent = `${count} event${count !== 1 ? 's' : ''}`;

            if (count > 0) {
                const visible = markers.filter(({ marker, event }) =>
                    filter === 'all' || event.category === filter
                );
                if (visible.length > 1) {
                    const bounds = L.featureGroup(visible.map(m => m.marker)).getBounds();
                    map.fitBounds(bounds.pad(0.1));
                }
            }
        });
    });


    // Site filter functionality
    let activeSite = 'all';
    const siteBtns = document.querySelectorAll('.site-btn');
    siteBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const site = btn.dataset.site;
            activeSite = site;

            siteBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            let count = 0;
            markers.forEach(({ marker, event }) => {
                const show = site === 'all' || (event.site && event.site === site);
                if (show) {
                    marker.addTo(map);
                    count++;
                } else {
                    map.removeLayer(marker);
                }
            });

            document.querySelectorAll('.event-card').forEach(card => {
                const showCat = activeFilter === 'all' || card.dataset.category === activeFilter;
                const showSite = site === 'all' || card.dataset.site === site;
                card.style.display = (showCat && showSite) ? 'block' : 'none';
            });

            document.getElementById('count').textContent = `${count} event${count !== 1 ? 's' : ''}`;

            if (count > 0) {
                const visible = markers.filter(({ marker, event }) => {
                    const matchCat = activeFilter === 'all' || event.category === activeFilter;
                    const matchSite = site === 'all' || event.site === site;
                    return matchCat && matchSite;
                });
                if (visible.length > 1) {
                    const bounds = L.featureGroup(visible.map(m => m.marker)).getBounds();
                    map.fitBounds(bounds.pad(0.1));
                }
            }
        });
    });



    // Search functionality
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', applyFilters);

    // Flatpickr calendar
    const calendarInput = document.getElementById('calendar-input');
    let selectedDates = null;
    flatpickr(calendarInput, {
        mode: "range",
        dateFormat: "Y-m-d",
        onChange: function(selectedDates, dateStr, instance) {
            selectedDates = selectedDates;
            applyFilters();
        }
    });

    // Combined filter function
    function applyFilters() {
        const query = searchInput.value.toLowerCase().trim();
        
        markers.forEach(({ marker, event, idx }) => {
            let show = true;

            // Category filter
            if (activeFilter !== 'all' && event.category !== activeFilter) {
                show = false;
            }

            // Site filter
            if (activeSite !== 'all' && event.site !== activeSite) {
                show = false;
            }

            // Search filter
            if (query) {
                const searchable = `${event.title} ${event.location} ${event.category} ${event.date} ${event.site || ''}`.toLowerCase();
                if (!searchable.includes(query)) {
                    show = false;
                }
            }

            // Date filter
            if (selectedDates && selectedDates.length > 0) {
                const eventDate = parseDate(event.date);
                if (eventDate) {
                    const [start, end] = selectedDates;
                    const inRange = eventDate >= start && eventDate <= end;
                    if (!inRange) {
                        show = false;
                    }
                }
            }

            if (show) {
                marker.addTo(map);
            } else {
                map.removeLayer(marker);
            }
        });

        // Update sidebar cards
        document.querySelectorAll('.event-card').forEach(card => {
            let show = true;
            if (activeFilter !== 'all' && card.dataset.category !== activeFilter) show = false;
            if (activeSite !== 'all' && card.dataset.site !== activeSite) show = false;
            
            if (query) {
                const text = card.textContent.toLowerCase();
                if (!text.includes(query)) show = false;
            }
            
            if (selectedDates && selectedDates.length > 0) {
                const dateText = card.querySelector('.event-time')?.textContent || '';
                const eventDate = parseDate(dateText);
                if (eventDate) {
                    const [start, end] = selectedDates;
                    if (eventDate < start || eventDate > end) show = false;
                }
            }
            
            card.style.display = show ? 'block' : 'none';
        });

        // Update count
        const visible = markers.filter(({ event }) => {
            let show = true;
            if (activeFilter !== 'all' && event.category !== activeFilter) show = false;
            if (activeSite !== 'all' && event.site !== activeSite) show = false;
            if (query) {
                const searchable = `${event.title} ${event.location} ${event.category} ${event.date} ${event.site || ''}`.toLowerCase();
                if (!searchable.includes(query)) show = false;
            }
            if (selectedDates && selectedDates.length > 0) {
                const eventDate = parseDate(event.date);
                if (eventDate) {
                    const [start, end] = selectedDates;
                    if (eventDate < start || eventDate > end) show = false;
                }
            }
            return show;
        });
        
        const count = visible.length;
        document.getElementById('count').textContent = `${count} event${count !== 1 ? 's' : ''}`;

        if (count > 1) {
            const bounds = L.featureGroup(visible.map(m => m.marker)).getBounds();
            map.fitBounds(bounds.pad(0.1));
        }
    }

    // Date parser
    function parseDate(dateStr) {
        const months = {
            'january': 0, 'february': 1, 'march': 2, 'april': 3, 'may': 4, 'june': 5,
            'july': 6, 'august': 7, 'september': 8, 'october': 9, 'november': 10, 'december': 11
        };
        const match = dateStr.match(/(\w+)\s+(\d+),\s+(\d+)/);
        if (match) {
            return new Date(parseInt(match[3]), months[match[1].toLowerCase()], parseInt(match[2]));
        }
        return null;
    }


    // Legend - positioned bottom-left with enough padding
    const legend = L.control({ position: 'bottomleft', className: 'legend-control' });
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `
            <div class="legend-title">Categories</div>
            <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Outdoor</div>
            <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>Festival</div>
            <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Library</div>
            <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Nature</div>
            <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>Educational</div>
            <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div>Free</div>
            <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>Sports</div>
        `;
        return div;
    };
    legend.addTo(map);
    </script>
