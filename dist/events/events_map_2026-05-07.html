<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

#sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); background: var(--header-bg); }
#sidebar-header h1 { font-size: 18px; margin-bottom: 4px; }
#sidebar-header .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
#search-input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 14px; outline: none; }
#search-input:focus { border-color: var(--accent); }
.filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.filter-btn { padding: 4px 10px; border-radius: 16px; border: 1px solid var(--border); background: var(--btn-bg); color: var(--text); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.filter-btn:hover { background: var(--hover); }
.filter-btn.active { background: var(--btn-active); color: var(--btn-text); border-color: var(--btn-active); }
#calendar-container { margin-top: 10px; }
#calendar-input { width: 100%; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 13px; }
.flatpickr-calendar { background: var(--card-bg) !important; border: 1px solid var(--border) !important; }
.flatpickr-day { color: var(--text) !important; }
.flatpickr-day.selected { background: var(--accent) !important; }
.flatpickr-day.has-event::after { background: #f97316 !important; }
.flatpickr-months .flatpickr-month { background: var(--card-bg) !important; }
.flatpickr-current-month input { color: var(--text) !important; }
.numInputWrapper span { color: var(--text) !important; }
#site-filters { margin-top: 8px; }
#event-count { float: right; font-size: 12px; color: var(--muted); margin-top: 4px; }
#event-list { flex: 1; overflow-y: auto; padding: 8px; }
.event-card { padding: 12px; margin-bottom: 8px; border-radius: 8px; background: var(--card-bg); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
.event-card:hover { border-color: var(--accent); transform: translateX(2px); }
.event-card .event-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.event-card .event-meta { font-size: 12px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 8px; }
.event-card .event-meta span { display: flex; align-items: center; gap: 3px; }
.event-card .event-site { font-size: 11px; color: var(--accent); margin-top: 4px; }
.event-card .event-cat { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; color: #fff; margin-left: 4px; }
#map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }
.leaflet-popup-content-wrapper { background: var(--card-bg) !important; color: var(--text) !important; border-radius: 8px !important; }
.leaflet-popup-tip { background: var(--card-bg) !important; }
.leaflet-popup-content { margin: 10px 14px !important; font-size: 13px !important; }
.popup-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
.popup-meta { font-size: 12px; color: var(--muted); line-height: 1.5; }
.popup-link { color: var(--accent); text-decoration: none; word-break: break-all; }
.legend { background: var(--card-bg) !important; border: 1px solid var(--border) !important; border-radius: 8px !important; padding: 10px 14px !important; margin: 12px !important; z-index: 1000 !important; }
.legend h4 { font-size: 13px; margin-bottom: 6px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; margin: 3px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.theme-toggle { position: absolute; top: 12px; right: 12px; z-index: 1000; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; font-size: 16px; }
#no-results { text-align: center; padding: 40px 20px; color: var(--muted); display: none; }
@media (max-width: 768px) {
  body { flex-direction: column; }
  #sidebar { width: 100%; min-width: auto; height: 50vh; }
  #map-container { height: 50vh; }
}
</style>

// Date parsing
const subtitleEl = document.querySelector('.subtitle');
const dateMatchStr = subtitleEl ? subtitleEl.textContent.match(/(\w+)\s+(\d{4})/) : null;
const monthNames = { january:0,jan:0,february:1,feb:1,march:2,mar:2,april:3,apr:3,may:4,june:5,jun:5,july:6,jul:6,august:7,aug:7,september:8,sep:8,october:9,oct:9,november:10,nov:10,december:11,dec:11 };
const calendarYear = dateMatchStr ? parseInt(dateMatchStr[2]) : 2026;
const calendarMonth = dateMatchStr ? monthNames[dateMatchStr[1].toLowerCase()] : 4;

function parseDate(dateStr) {
  const months = monthNames;
  const year = calendarYear;
  let match = dateStr.match(/(\w+)\s+(\d+),?\s*(\d{4})/);
  if (match) return new Date(parseInt(match[3]), months[match[1].toLowerCase()], parseInt(match[2]));
  match = dateStr.match(/(\w+)\s+(\d+)/);
  if (match && match[1].toLowerCase() in months) return new Date(year, months[match[1].toLowerCase()], parseInt(match[2]));
  match = dateStr.match(/(\d+)\s+(\w+)/);
  if (match && match[2].toLowerCase() in months) return new Date(year, months[match[2].toLowerCase()], parseInt(match[1]));
  return null;
}

function parseRecurring(dateStr) {
  if (/recurring weekly on /i.test(dateStr)) {
    const days = dateStr.split('on ')[1].split(',').map(d => d.trim().toLowerCase());
    const dayMap = { sunday:0, monday:1, tuesday:2, wednesday:3, thursday:4, friday:5, saturday:6 };
    const weekdays = days.map(d => dayMap[d]).filter(d => d !== undefined);
    return { type: 'weekly', weekdays };
  }
  if (/recurring daily until/i.test(dateStr)) {
    const untilMatch = dateStr.match(/until\s+(\w+\s+\d+,\s*\d{4})/i);
    const untilDate = untilMatch ? parseDate(untilMatch[1]) : null;
    return { type: 'daily', until: untilDate };
  }
  if (/dates vary between/i.test(dateStr)) {
    const rangeMatch = dateStr.match(/between\s+(\w+\s+\d+,\s*\d{4})\s*[-–]\s*(\w+\s+\d+,\s*\d{4})/i);
    if (rangeMatch) return { type: 'range', start: parseDate(rangeMatch[1]), end: parseDate(rangeMatch[2]) };
  }
  return null;
}

function datesForRecurringInMonth(recurring, year, month) {
  const keys = [];
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    if (recurringActiveOn(recurring, date)) {
      const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      keys.push(key);
    }
  }
  return keys;
}

function recurringActiveOn(recurring, date) {
  if (recurring.type === 'weekly') return recurring.weekdays.includes(date.getDay());
  if (recurring.type === 'daily') return recurring.until && date <= recurring.until;
  if (recurring.type === 'range') return recurring.start && recurring.end && date >= recurring.start && date <= recurring.end;
  return false;
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Collect event dates for calendar dots
const eventDates = new Set();
events.forEach(ev => {
  const d = parseDate(ev.date);
  if (d) { ev._date = d; eventDates.add(dateKey(d)); }
  const recurring = parseRecurring(ev.date);
  if (recurring) { ev._recurring = recurring; datesForRecurringInMonth(recurring, calendarYear, calendarMonth).forEach(k => eventDates.add(k)); }
});

  countEl.textContent = filtered.length + ' event' + (filtered.length !== 1 ? 's' : '');
  filtered.forEach(ev => {
    const cat = ev.category || 'other';
    const card = document.createElement('div');
    card.className = 'event-card';
    card.dataset.eventDate = ev.date;
    card.dataset.url = ev.url;
    card.innerHTML = `<div class="event-title">${ev.title}<span class="event-cat" style="background:${categoryColors[cat]}">${categoryLabels[cat]}</span></div>
      <div class="event-meta"><span>📅 ${ev.date}</span>${ev.time && ev.time !== 'All Day' ? '<span>⏰ '+ev.time+'</span>' : ''}${ev.location ? '<span>📍 '+ev.location+'</span>' : ''}</div>
      <div class="event-site">${ev.site}</div>`;
    card.addEventListener('click', () => {
      const marker = markers[ev.url];
      if (marker) { map.setView(marker.getLatLng(), 13); marker.openPopup(); }
    });
    eventList.appendChild(card);
  });
}

function applyFilters() {
  const query = searchInput.value.toLowerCase();
  let filtered = events.filter(ev => {
    if (activeFilter !== 'all' && (ev.category || 'other') !== activeFilter) return false;
    if (activeSite !== 'all' && ev.site !== activeSite) return false;
    if (query) {
      const text = (ev.title + ' ' + (ev.location||'') + ' ' + (ev.category||'') + ' ' + ev.date).toLowerCase();
      if (!text.includes(query)) return false;
    }
    if (selectedDate) {
      const sd = selectedDate.getFullYear();
      const sm = selectedDate.getMonth();
      const sday = selectedDate.getDate();
      let dateMatch = false;
      if (ev._date && ev._date.getFullYear() === sd && ev._date.getMonth() === sm && ev._date.getDate() === sday) dateMatch = true;
      if (!dateMatch && ev._recurring && recurringActiveOn(ev._recurring, new Date(sd, sm, sday))) dateMatch = true;
      if (!dateMatch) return false;
    }
    return true;
  });
  renderEvents(filtered);
  // Update map markers visibility
  Object.values(markers).forEach(m => map.hasLayer(m) ? null : null); // keep all visible, filter is visual in sidebar
}

// Event listeners
document.getElementById('category-filters').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('#category-filters .filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    applyFilters();
  }
});
document.getElementById('site-filters').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('#site-filters .filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeSite = e.target.dataset.filter;
    applyFilters();
  }
});
let searchTimeout;
searchInput.addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(applyFilters, 200); });

// Add markers to map
const markersGroup = L.layerGroup();
events.forEach(ev => {
  const marker = markers[ev.url];
  if (marker) markersGroup.addLayer(marker);
});
markersGroup.addTo(map);

// Initial render
applyFilters();
</script>
</body>
</html>
